<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installment Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #e9f0ff, #f8f9ff, #ffffff); padding: 30px 15px; color: #1f1f1f; }
        .container { max-width: 1000px; margin: auto; background: rgba(255, 255, 255, 0.8); border-radius: 32px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
        h2 { text-align: center; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; }
        input, select { height: 50px; border: 1px solid #ddd; border-radius: 12px; padding: 0 15px; font-size: 16px; margin-top: 5px; }
        
        .rate-flex { display: flex; gap: 10px; margin-top: 5px; }
        .rate-flex input { flex: 1; margin-top: 0; }
        .rate-flex select { width: 120px; margin-top: 0; }

        /* Button Styles */
        .button-group { display: flex; gap: 15px; margin-top: 25px; }
        button { flex: 1; height: 56px; border: none; border-radius: 18px; font-size: 17px; cursor: pointer; transition: 0.2s ease-in-out; }
        .btn-calc { background: #4285f4; color: #fff; }
        .btn-calc:hover { background: #3367d6; }
        .btn-clear { background: #f8f9fa; color: #333; border: 1px solid #ddd; }
        .btn-clear:hover { background: #e8eaed; }

        .table-wrapper { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; white-space: nowrap; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background: #f8f9fa; }
        .dp-text { color: #0f9d58; }
        .net-text { font-weight: bold; }
        .card-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Installment Calculator</h2>
    <div class="form-grid">
        <div class="input-group">
            <label>Item Price</label>
            <input type="number" id="price" placeholder="e.g. 50000">
        </div>
        <div class="input-group">
            <label>Downpayment</label>
            <input type="number" id="downpayment" placeholder="e.g. 5000">
        </div>
        <div class="input-group">
            <label>Term (Months)</label>
            <select id="months">
                <option value="3">3 Months</option>
                <option value="6">6 Months</option>
                <option value="9">9 Months</option>
                <option value="12" selected>12 Months</option>
                <option value="24">24 Months</option>
            </select>
        </div>
        <div class="input-group">
            <label>Interest Type</label>
            <select id="interestType">
                <option value="simple">Simple (Add-on)</option>
                <option value="amortized">Amortized</option>
            </select>
        </div>
        <div class="input-group">
            <label>Interest Rate (%)</label>
            <div class="rate-flex">
                <input type="number" id="rate" placeholder="e.g. 1">
                <select id="ratePeriod">
                    <option value="monthly">Monthly</option>
                    <option value="annual">Annual</option>
                </select>
            </div>
        </div>
    </div>
    
    <div class="button-group">
        <button type="button" class="btn-clear" onclick="clearForm()">Clear</button>
        <button type="button" class="btn-calc" onclick="calculate()">Calculate</button>
    </div>
    
    <div id="result"></div>
</div>

<script>
function peso(num) {
    return "₱" + num.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function clearForm() {
    document.getElementById('price').value = '';
    document.getElementById('downpayment').value = '';
    document.getElementById('rate').value = '';
    document.getElementById('months').value = '12';
    document.getElementById('interestType').value = 'simple';
    document.getElementById('ratePeriod').value = 'monthly';
    document.getElementById('result').innerHTML = '';
}

function calculate() {
    const price = parseFloat(document.getElementById('price').value) || 0;
    const dp = parseFloat(document.getElementById('downpayment').value) || 0;
    const months = parseInt(document.getElementById('months').value);
    const type = document.getElementById('interestType').value;
    
    // Handle Monthly vs Annual Rate Conversion
    const rateInput = (parseFloat(document.getElementById('rate').value) || 0) / 100;
    const ratePeriod = document.getElementById('ratePeriod').value;
    
    let monthlyRate = 0;
    if (ratePeriod === "monthly") {
        monthlyRate = rateInput;
    } else {
        monthlyRate = rateInput / 12;
    }

    if (price <= 0) {
        document.getElementById('result').innerHTML = "<p style='color:red; text-align:center; margin-top:20px;'>Please enter a valid item price.</p>";
        return;
    }
    
    if (dp >= price) {
        document.getElementById('result').innerHTML = "<p style='color:red; text-align:center; margin-top:20px;'>Downpayment must be less than the Item Price.</p>";
        return;
    }

    // Interest calculated on the FULL price
    const loanPrincipal = price; 

    let schedule = [];
    let monthlyPayment = 0;
    let totalInterest = 0;

    // Generate Standard Schedule (Based on Full Price)
    if (type === "amortized") {
        if (monthlyRate === 0) {
            monthlyPayment = loanPrincipal / months;
            let balance = loanPrincipal;
            for (let i = 1; i <= months; i++) {
                let principal = monthlyPayment;
                schedule.push({ month: i, start: balance, payment: monthlyPayment, principal, interest: 0, end: balance - principal });
                balance -= principal;
            }
        } else {
            monthlyPayment = (loanPrincipal * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            let balance = loanPrincipal;
            for (let i = 1; i <= months; i++) {
                let interest = balance * monthlyRate;
                let principal = monthlyPayment - interest;
                schedule.push({ month: i, start: balance, payment: monthlyPayment, principal, interest, end: balance - principal });
                balance -= principal;
                totalInterest += interest;
            }
        }
    } else {
        // Bank Credit Card Style: Simple Add-on Interest
        // Principal * Monthly Rate * Number of Months
        const totalInterestCharged = loanPrincipal * monthlyRate * months;
        monthlyPayment = (loanPrincipal + totalInterestCharged) / months;
        let balance = loanPrincipal;
        
        for (let i = 1; i <= months; i++) {
            let interest = totalInterestCharged / months;
            let principal = loanPrincipal / months;
            schedule.push({ month: i, start: balance, payment: monthlyPayment, principal, interest, end: balance - principal });
            balance -= principal;
            totalInterest += interest;
        }
    }

    // Apply the Downpayment to the final months
    let remainingDP = dp;
    for (let i = months - 1; i >= 0; i--) {
        if (remainingDP <= 0) {
            schedule[i].dpCredit = 0;
            schedule[i].actualPayment = schedule[i].payment;
            continue;
        }
        
        if (remainingDP >= schedule[i].payment) {
            schedule[i].dpCredit = schedule[i].payment;
            schedule[i].actualPayment = 0;
            remainingDP -= schedule[i].payment;
        } else {
            schedule[i].dpCredit = remainingDP;
            schedule[i].actualPayment = schedule[i].payment - remainingDP;
            remainingDP = 0;
        }
    }

    let html = `
        <div class="card-summary">
            <div class="card"><strong>Standard Monthly:</strong><br>${peso(monthlyPayment)}</div>
            <div class="card"><strong>Total Interest:</strong><br>${peso(totalInterest)}</div>
            <div class="card"><strong>Total Cost:</strong><br>${peso(price + totalInterest)}</div>
        </div>
        <div class="table-wrapper">
        <table>
            <tr>
                <th>Mo</th>
                <th>Beginning</th>
                <th>Principal</th>
                <th>Interest</th>
                <th>Reg. PMT</th>
                <th>DP Applied</th>
                <th>Net Payment</th>
                <th>Ending</th>
            </tr>
            ${schedule.map(r => `<tr>
                <td>${r.month}</td>
                <td>${peso(r.start)}</td>
                <td>${peso(r.principal)}</td>
                <td>${peso(r.interest)}</td>
                <td>${peso(r.payment)}</td>
                <td class="dp-text">-${peso(r.dpCredit)}</td>
                <td class="net-text">${peso(r.actualPayment)}</td>
                <td>${peso(Math.max(0, r.end))}</td>
            </tr>`).join('')}
        </table>
        </div>`;
    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
