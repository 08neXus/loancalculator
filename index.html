<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Installment Calculator</title>
    <style>
        :root {
            --bg-color: #f7f7f9;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --border-color: #e5e5ea;
            --input-bg: #ffffff;
            --select-bg: #f2f2f7;
            --primary: #5e5ce6;
            --primary-hover: #4b48b6;
            --btn-gray: #f2f2f7;
            --btn-gray-hover: #e5e5ea;
            --radius-lg: 20px;
            --radius-md: 14px;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-family); }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; padding: 20px 10px; }
        
        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .header-icon { 
            width: 40px; height: 40px; background: var(--bg-color); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--primary); border: 1px solid var(--border-color); 
        }
        .header-title h1 { font-size: 20px; font-weight: 700; margin: 0; }
        .header-title p { font-size: 13px; color: var(--text-muted); margin: 0; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 15px; font-weight: 600; margin-bottom: 8px; }
        
        .dp-row { display: flex; align-items: center; gap: 10px; }
        .dp-label { font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
        input[type="checkbox"] { width: 20px; height: 20px; border-radius: 4px; accent-color: var(--primary); cursor: pointer; flex-shrink: 0; }
        input[type="number"], select { width: 100%; height: 48px; border-radius: var(--radius-md); font-size: 15px; padding: 0 16px; outline: none; border: 1px solid var(--border-color); background-color: var(--input-bg); }
        
        .interest-inline { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .interest-inline label { margin-bottom: 0; white-space: nowrap; }
        .interest-inline input { width: 120px; }

        select { background-color: var(--select-bg); border: none; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 40px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        button { height: 52px; border-radius: var(--radius-md); border: none; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-calc { flex: 1.2; background-color: var(--primary); color: white; }
        .btn-clear { flex: 0.8; background-color: var(--btn-gray); color: var(--text-main); }

        .results-container { margin-top: 24px; display: none; }
        .results-card { background-color: #fcfcfd; border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; text-align: center; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 16px; }
        .result-item span { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .result-item strong { font-size: 16px; color: var(--text-main); }
        .total-payable span { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .total-payable strong { font-size: 24px; color: var(--text-main); font-weight: 700; }

        .table-wrapper { margin-top: 16px; overflow-x: auto; display: none; border: 1px solid var(--border-color); border-radius: var(--radius-md); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid var(--border-color); }
        th { background: var(--select-bg); font-weight: 600; color: var(--text-muted); }
        .dp-text { color: #34c759; }
        .net-text { font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16.01" y2="14"></line><line x1="16" y1="18" x2="16.01" y2="18"></line><line x1="12" y1="14" x2="12.01" y2="14"></line><line x1="12" y1="18" x2="12.01" y2="18"></line><line x1="8" y1="14" x2="8.01" y2="14"></line><line x1="8" y1="18" x2="8.01" y2="18"></line></svg>
        </div>
        <div class="header-title"><h1>Installment Calculator</h1><p>melvinpangilinan</p></div>
    </div>

    <div class="form-group"><label class="form-label">Item Price (₱)</label><input type="number" id="price" placeholder="Enter item price"></div>
    <div class="form-group">
        <div class="dp-row">
            <input type="checkbox" id="useDp" onchange="document.getElementById('downpayment').disabled = !this.checked;">
            <label class="dp-label" for="useDp">Downpayment(optional)</label>
            <input type="number" id="downpayment" placeholder="0.00" disabled>
        </div>
    </div>

    <div class="grid-2 form-group">
        <div>
