<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Installment Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Installment Calculator</h1>
    </header>

    <section class="card">
      <div class="row">
        <label class="label">Item Price (₱)</label>
        <input id="price" type="number" placeholder="Enter item price" />
      </div>

      <div class="row">
        <label class="label">Use downpayment</label>
        <div class="row two-col">
          <div class="col"><input type="checkbox" id="downToggle" /></div>
          <div class="col"><input id="downPayment" type="number" placeholder="Downpayment amount" disabled /></div>
        </div>
      </div>

      <div class="row two-col">
        <div class="col">
          <label class="label">Payment Term</label>
          <select id="term" onchange="updateAutoRate()">
            <option value="0">0 months (full)</option>
            <option value="3">3 months</option>
            <option value="6">6 months</option>
            <option value="12">12 months</option>
          </select>
        </div>
        <div class="col">
          <label class="label">Interest Type</label>
          <select id="interestType">
            <option value="simple">Simple (Add-On)</option>
            <option value="amortized">Amortized</option>
          </select>
        </div>
      </div>

      <div class="row btn-row">
        <button id="calcBtn" class="btn primary">Calculate</button>
        <button id="clearBtn" class="btn neutral">Clear</button>
      </div>

      <div class="row summary-row hidden" id="summaryCard">
        <div class="summary-item">
          <div class="s-label">Principal to Finance</div>
          <div class="s-value" id="principalVal">—</div>
        </div>
        <div class="summary-item">
          <div class="s-label">Monthly Payment</div>
          <div class="s-value" id="monthlyVal">—</div>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="breakdown" class="table">
          <thead><tr><th>Month</th><th>Beg Bal</th><th>Interest</th><th>Principal</th><th>End Bal</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
    <div id="toast" class="toast">Action Complete</div>
  </main>
  <script src="script.js"></script>
</body>
</html>
