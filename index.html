<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installment Calculator</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",
    "Segoe UI",Roboto,sans-serif;
}

body{
    min-height:100vh;
    background:
        linear-gradient(135deg,#e9f0ff,#f8f9ff,#ffffff);
    padding:30px 15px;
    color:#1f1f1f;
}

.container{
    max-width:1000px;
    margin:auto;
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
    background:rgba(255,255,255,0.6);
    border:1px solid rgba(255,255,255,0.5);
    border-radius:32px;
    padding:30px;
    box-shadow:
        0 8px 32px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.8);
}

h2{
    text-align:center;
    font-weight:700;
    font-size:28px;
    margin-bottom:30px;
    color:#202124;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-size:14px;
    font-weight:500;
    color:#5f6368;
}

input:not([type="checkbox"]),
select{
    height:56px;
    border:1px solid rgba(0,0,0,0.1);
    border-radius:18px;
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    padding:0 18px;
    font-size:16px;
    transition:all .25s;
    outline:none;
}

input:focus,
select:focus{
    border:2px solid #4285f4;
    box-shadow:0 0 0 4px rgba(66,133,244,0.15);
}

button{
    width:100%;
    height:56px;
    border:none;
    border-radius:18px;
    margin-top:25px;
    background:#4285f4;
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(66,133,244,0.35);
}

#result{
    margin-top:30px;
}

.table-wrapper{
    width:100%;
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    border-radius:24px;
    background:rgba(255,255,255,0.65);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.6);
    box-shadow:0 8px 32px rgba(0,0,0,0.08);
}

/* KEY FIX */
table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed; /* forces fitting */
    min-width:unset;     /* REMOVE overflow forcing width */
}

th, td{
    padding:10px 6px;
    font-size:12px;
    text-align:center;
    word-wrap:break-word;
    white-space:normal;
}

/* Make headers readable on small screens */
th{
    background:rgba(66,133,244,0.12);
    font-weight:600;
}

/* optional: reduce font on mobile */
@media (max-width:768px){
    th, td{
        font-size:11px;
        padding:8px 4px;
    }
}
tr:hover{
    background:rgba(66,133,244,0.05);
}

#downpaymentDiv{
    display:none;
}

@media (max-width:768px){

    .container{
        padding:20px;
        border-radius:24px;
    }

    h2{
        font-size:24px;
    }

    table{
        min-width:700px;
        font-size:13px;
    }
}
.checkbox-label{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    font-size:10px;
    font-weight:500;
    color:#5f6368;
}
.checkbox-label input[type="checkbox"]{
    width:22px;
    height:22px;
    margin:0;
    accent-color:#4285f4;
    flex-shrink:0;
}
#downpaymentDiv{
    display:none;
}
.card-summary{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:rgba(255,255,255,0.7);
    padding:15px;
    border-radius:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    text-align:center;
}

.month-card{
    background:rgba(255,255,255,0.6);
    margin-bottom:15px;
    padding:15px;
    border-radius:18px;
    box-shadow:0 4px 18px rgba(0,0,0,0.06);
}
</style>
</head>
<body>

<div class="container">
    <h2>Installment Calculator</h2>
    
    <div class="form-grid">
        
    <div class="input-group">
        <label>Item Price</label>
        <input type="number" id="price" placeholder="Enter item price">
    </div>

    <div class="input-group">
    <label class="checkbox-label">
        <input type="checkbox"
               id="useDP"
               onchange="toggleDP()">
        Downpayment
    </label>
    </div>

    <div class="input-group" id="downpaymentDiv">
        <label>Downpayment Amount</label>
        <input type="number" id="downpayment" placeholder="Enter downpayment amount">
    </div>

    <div class="input-group">
        <label>Payment Term</label>
        <select id="months">
            <option value="0">0 Month (Cash)</option>
            <option value="3">3 Months</option>
            <option value="6">6 Months</option>
            <option value="9">9 Months</option>
            <option value="12">12 Months</option>
            <option value="24">24 Months</option>
        </select>
    </div>

    <div class="input-group">
        <label>Interest Type</label>
        <select id="interestType">
            <option value="simple" selected>Simple (Monthly Add-on)</option>
            <option value="amortized">Amortized</option>
            <option value="fixed">Fixed</option>
            <option value="compound">Compound</option>
        </select>
    </div>

    <div class="input-group">
        <label>Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="Enter interest rate">
    </div>
    
   </div>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>
</div>
<script>
function peso(num){
    return "₱" + num.toLocaleString(undefined,{
        minimumFractionDigits:2,
        maximumFractionDigits:2
    });
}

function toggleDP() {
    const dpDiv = document.getElementById("downpaymentDiv");
    const useDP = document.getElementById("useDP");
    const dpInput = document.getElementById("downpayment");

    dpDiv.style.display =
    useDP.checked ? "block" : "none";
    if (!useDP.checked) {
        dpInput.value = "";
    }
}

function calculate(){

    let price = parseFloat(document.getElementById('price').value) || 0;
    let months = parseInt(document.getElementById('months').value) || 0;
    let rate = parseFloat(document.getElementById('rate').value) || 0;
    let type = document.getElementById('interestType').value;

    let useDP = document.getElementById('useDP').checked;
    let dp = useDP ? (parseFloat(document.getElementById('downpayment').value) || 0) : 0;

    if(price <= 0){
        document.getElementById('result').innerHTML =
        "<div class='card'><h3>Please enter item price</h3></div>";
        return;
    }

    let loanAmount = price; // interest always based on full price

    if(months === 0){
        document.getElementById('result').innerHTML = `
        <div class="card">
            <h3>Cash Price</h3>
            <p>${peso(loanAmount)}</p>
        </div>`;
        return;
    }

    let schedule = [];
    let balance = loanAmount;

    let totalInterest = 0;
    let totalPrincipal = 0;

    let monthlyPayment = 0;
    let r = (rate/100)/12;

    if(type === "amortized"){
        monthlyPayment =
            r === 0 ? balance/months :
            (balance*r*Math.pow(1+r,months)) /
            (Math.pow(1+r,months)-1);
    }

    for(let i=1;i<=months;i++){

        let beginning = balance;
        let interest = 0;
        let payment = 0;
        let principalPay = 0;

        if(type === "amortized"){
            interest = beginning * r;
            payment = monthlyPayment;
            principalPay = payment - interest;
        }

        else if(type === "simple"){
            interest = (loanAmount * (rate/100)) / months;
            payment = (loanAmount + (loanAmount*(rate/100))) / months;
            principalPay = payment - interest;
        }

        else if(type === "fixed"){
            interest = (loanAmount * (rate/100)) / months;
            payment = (loanAmount + loanAmount*(rate/100)) / months;
            principalPay = payment - interest;
        }

        else if(type === "compound"){
            interest = beginning * (rate/100);
            payment = (loanAmount * Math.pow(1+(rate/100), months)) / months;
            principalPay = payment - interest;
        }

        let ending = beginning - principalPay;

        schedule.push({
            month:i,
            beginning,
            payment,
            principal:principalPay,
            interest,
            ending
        });

        balance = ending;

        totalInterest += interest;
        totalPrincipal += principalPay;
    }

    // 💰 Downpayment applied to last months
    let remainingDP = dp;

// apply DP only to final totals, NOT interest base
let finalTotalPrincipalPaid = 0;

    for(let i=schedule.length-1;i>=0;i--){
        if(remainingDP <= 0) break;

        let row = schedule[i];

        if(remainingDP >= row.payment){
            remainingDP -= row.payment;
            row.payment = 0;
            row.principal = 0;
            row.interest = 0;
        } else {
            let ratio = remainingDP / row.payment;

            row.payment -= remainingDP;
            row.principal -= row.principal * ratio;
            row.interest -= row.interest * ratio;

            remainingDP = 0;
        }
    }

    // 📊 SUMMARY + TABLE OUTPUT
    let html = `
    <div class="card-summary">
        <div class="card">
            <h3>Total Principal</h3>
            <p>${peso(totalPrincipal)}</p>
        </div>
        <div class="card">
            <h3>Total Interest</h3>
            <p>${peso(totalInterest)}</p>
        </div>
        <div class="card">
            <h3>Downpayment</h3>
            <p>${peso(dp)}</p>
        </div>
    </div>

    <div class="table-wrapper">
    <table>
        <tr>
            <th>Month</th>
            <th>Beginning</th>
            <th>Payment</th>
            <th>Principal</th>
            <th>Interest</th>
            <th>Ending</th>
        </tr>`;

    schedule.forEach(row=>{
        html += `
        <tr>
            <td>${row.month}</td>
            <td>${peso(Math.max(0,row.beginning))}</td>
            <td>${peso(Math.max(0,row.payment))}</td>
            <td>${peso(Math.max(0,row.principal))}</td>
            <td>${peso(Math.max(0,row.interest))}</td>
            <td>${peso(Math.max(0,row.ending))}</td>
        </tr>`;
    });

    html += `</table></div>`;

    document.getElementById('result').innerHTML = html;
}
</script>
</body>
</html>
